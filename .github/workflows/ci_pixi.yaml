name: CI (with pixi)

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"
  schedule:
    # At 09:00 UTC on Monday and Thursday.
    - cron: "0 9 * * *"
  workflow_dispatch:

defaults:
  run:
    shell: pixi run bash -e {0}

jobs:
  test:
    name: ${{ matrix.os }}, 🐍=${{ matrix.environment}}, 🟠=${{ matrix.ambertools }}, 👁️=${{ matrix.openeye }}, 🐉=${{ matrix.mamba-executable }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        environment: [
          py311,
          py312,
          py313,
          py314,
          py311-openeye,
          py312-openeye,
          py313-openeye,
          py311-ambertools,
          py312-ambertools,
          py313-ambertools,
          py311-openeye-ambertools,
          py312-openeye-ambertools,
          py313-openeye-ambertools,
          typing,
        ]
        mamba-executable: ["pixi"]

    env:
      OE_LICENSE: ${{ github.workspace }}/oe_license.txt
      COV: --cov=openff/utilities --cov-report=xml --cov-append

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up environment with pixi
      if: matrix.mamba-executable == 'pixi'
      uses: prefix-dev/setup-pixi@v0.9.3
      with:
        pixi-version: v0.56.0
        environments: ${{ matrix.environment }}

    - name: Check AmberTools Missing
      if: ${{ !contains(matrix.environment, 'ambertools') }}
      run: pixi run -e ${{ matrix.environment }} python -c "from shutil import which; assert which('sqm') is None"

    - name: Check AmberTools installation
      if: ${{ contains(matrix.environment, 'ambertools') }}
      run: pixi run -e ${{ matrix.environment }} python devtools/scripts/assert_ambertools_found.py

    - name: Check OpenEye Toolkits missing
      if: ${{ !contains(matrix.environment, 'openeye') }}
      run: pixi run -e ${{ matrix.environment }} python devtools/scripts/assert_openeye_not_found.py

    - name: Run a test with OpenEye toolkits installed but NOT licensed
      if: ${{ contains(matrix.environment, 'openeye') }}
      run: pixi run -e ${{ matrix.environment }} python -m pytest openff/utilities/_tests/test_utilities.py::test_requires_oe_module_installed_missing_license

    - name: License OpenEye
      if: ${{ contains(matrix.environment, 'openeye') }}
      run: |
        echo "${SECRET_OE_LICENSE}" > ${OE_LICENSE}
        pixi run -e ${{ matrix.environment }} python -c "from openeye import oechem; assert oechem.OEChemIsLicensed()"
      env:
        SECRET_OE_LICENSE: ${{ secrets.OE_LICENSE }}

    - name: Run mypy
      if: ${{ matrix.environment == 'typing' }}
      run: pixi run -e ${{ matrix.environment }} run_mypy

    - name: Run unit tests
      run: |
        pixi run -e ${{ matrix.environment }} run_tests

    - name: Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage.xml
